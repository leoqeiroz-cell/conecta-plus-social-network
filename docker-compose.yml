services:
  postgres:
    image: postgres:16-alpine
    container_name: conecta-plus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: conecta
      POSTGRES_PASSWORD: conecta
      POSTGRES_DB: conecta_plus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conecta -d conecta_plus"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: conecta-plus-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://conecta:conecta@postgres:5432/conecta_plus?schema=public
      JWT_SECRET: troque-este-segredo-em-producao
      JWT_EXPIRES_IN: 7d
      PORT: 3333
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3333:3333"
    command: sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts && node dist/server.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: conecta-plus-web
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3333/api
    ports:
      - "8080:80"

volumes:
  postgres-data:
